<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyIdle - Python 可视化执行</title>
    
    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        
        #header {
            height: 50px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
        }
        
        #header h1 {
            font-size: 18px;
            margin-right: auto;
        }
        
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        button:hover { background: #2980b9; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        #editor-container {
            width: 50%;
            height: 100%;
            border-right: 2px solid #ddd;
            position: relative;
            display: flex;
        }
        
        .line-numbers {
            width: 50px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 10px 5px;
            text-align: right;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #adb5bd;
            user-select: none;
            overflow: hidden;
            white-space: pre;
        }
        
        #editor {
            flex: 1;
            height: 100%;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 10px;
            border: none;
            outline: none;
            resize: none;
            tab-size: 4;
            background: #fafafa;
        }
        
        #visualization {
            width: 50%;
            height: 100%;
            background: white;
            overflow: auto;
            padding: 20px;
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            display: none;
            z-index: 1000;
        }
        
        .step-info {
            background: #ecf0f1;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
        }
        
        .var-container {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        
        .var-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }
        
        .var-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        
        .var-name { 
            color: #e74c3c; 
            font-weight: bold; 
            font-size: 14px;
        }
        
        .var-type { 
            background: #95a5a6; 
            color: white; 
            padding: 2px 8px; 
            border-radius: 3px; 
            font-size: 11px;
        }
        
        .var-value { 
            color: #27ae60; 
            font-family: monospace;
        }
        
        .var-items {
            margin-top: 8px;
            padding-left: 20px;
            border-left: 2px solid #dee2e6;
        }
        
        .var-item {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 2px 0;
            font-size: 12px;
        }
        
        .item-index {
            color: #7f8c8d;
            min-width: 30px;
        }
        
        .empty-vars {
            color: #95a5a6;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }
        
        h3 {
            color: #2c3e50;
            margin: 20px 0 10px;
            font-size: 16px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }
        
        .error-box {
            background: #fee;
            border: 1px solid #e74c3c;
            border-radius: 5px;
            padding: 20px;
            color: #c0392b;
        }
        
        .error-box pre {
            background: #fff;
            padding: 10px;
            border-radius: 3px;
            overflow: auto;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .code-preview {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
            color: #495057;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Python 可视化执行器</h1>
        <button id="btn-run" onclick="runCode()">▶ 运行</button>
        <button id="btn-next" onclick="stepForward()" disabled>→ 下一步</button>
        <button id="btn-prev" onclick="stepBackward()" disabled>← 上一步</button>
        <button onclick="reset()">↺ 重置</button>
    </div>
    
    <div id="main">
        <div id="editor-container">
            <div class="line-numbers" id="line-numbers">1</div>
            <textarea id="editor" spellcheck="false"># 测试代码 - 简单变量和函数
x = 42
name = "Alice"
items = [1, 2, 3, 4, 5]

def add(a, b):
    result = a + b
    return result

final = add(10, 20)
print(final)</textarea>
        </div>
        <div id="visualization">
            <div style="color: #999; text-align: center; margin-top: 50%;">
                点击"运行"开始可视化执行
            </div>
        </div>
    </div>
    
    <div id="status"></div>

    <script>
        // 全局变量
        let pyodide;
        let executionSteps = [];
        let currentStep = 0;
        let isInitialized = false;
        let userCodeLines = [];  // 存储用户代码行用于显示

        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('line-numbers');
        const visualization = document.getElementById('visualization');

        // 同步行号
        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            const numbers = Array(lines).fill(0).map((_, i) => i + 1).join('\n');
            lineNumbers.textContent = numbers;
        }

        editor.addEventListener('input', updateLineNumbers);
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });
        
        // Tab 键支持
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
            }
        });

        updateLineNumbers();

        // 显示状态
        function showStatus(msg, duration = 3000) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.display = 'block';
            if (duration > 0) {
                setTimeout(() => el.style.display = 'none', duration);
            }
        }

        // 初始化 Pyodide
        async function initPyodide() {
            showStatus('正在加载 Python 运行时...', 0);
            pyodide = await loadPyodide();
            
            // 注入追踪代码 - 关键修复：过滤掉 Pyodide 内部代码
            const tracerCode = `
import sys
import json
import builtins

class ExecutionTracer:
    def __init__(self):
        self.steps = []
        self.current_step = 0
        self.max_steps = 500
        self.user_code = ""
        
    def set_user_code(self, code):
        """存储用户代码用于行号映射"""
        self.user_code = code
        self.code_lines = code.split('\\n')
        
    def trace_calls(self, frame, event, arg):
        if self.current_step >= self.max_steps:
            return None
            
        # 关键：只追踪用户代码（<exec> 是 pyodide.runPythonAsync 使用的文件名）
        filename = frame.f_code.co_filename
        if filename != '<exec>':
            # 跳过所有非用户代码（Pyodide 内部、标准库等）
            return self.trace_calls
        
        if event == 'line':
            lineno = frame.f_lineno
            
            # 获取当前行的代码内容
            line_content = ""
            if 1 <= lineno <= len(self.code_lines):
                line_content = self.code_lines[lineno - 1].strip()
            
            # 获取局部变量
            local_vars = {}
            for name, value in frame.f_locals.items():
                if not name.startswith('__') and name != 'sys':
                    try:
                        local_vars[name] = self.serialize_value(value)
                    except Exception as e:
                        local_vars[name] = {"type": "error", "repr": f"序列化错误: {str(e)}"}
            
            # 获取全局变量（只包含用户定义的）
            global_vars = {}
            for name, value in frame.f_globals.items():
                # 过滤掉内置模块和 Pyodide 内部对象
                if (not name.startswith('__') and 
                    name not in ['sys', 'json', 'builtins', 'ExecutionTracer', 'tracer'] and
                    not name in dir(builtins)):  # 排除内置函数如 print, len 等
                    try:
                        serialized = self.serialize_value(value)
                        # 进一步过滤：排除模块类型（通常是导入的库）
                        if serialized.get('type') != 'module':
                            global_vars[name] = serialized
                    except:
                        pass
            
            step_info = {
                "step": self.current_step,
                "line": lineno,
                "line_content": line_content,
                "function": str(frame.f_code.co_name),
                "locals": local_vars,
                "globals": global_vars,
                "stack_depth": self.get_stack_depth(frame)
            }
            
            self.steps.append(step_info)
            self.current_step += 1
            
        return self.trace_calls
    
    def get_stack_depth(self, frame):
        """计算调用栈深度，但只计算用户代码层"""
        depth = 0
        current = frame
        while current:
            if current.f_code.co_filename == '<exec>':
                depth += 1
            current = current.f_back
        return depth
    
    def serialize_value(self, obj, depth=0, seen=None):
        """递归序列化 Python 对象为字典"""
        if seen is None:
            seen = set()
        
        # 防止循环引用
        obj_id = id(obj)
        if obj_id in seen:
            return {"type": "circular", "repr": "<循环引用>"}
        
        if depth > 5:
            return {"type": "deep", "repr": "<深层对象>"}
        
        seen = seen | {obj_id}
        
        # None
        if obj is None:
            return {"type": "NoneType", "repr": "None"}
        
        # 布尔值（必须在 int 之前检查）
        if isinstance(obj, bool):
            return {"type": "bool", "repr": str(obj), "value": obj}
        
        # 整数
        if isinstance(obj, int):
            return {"type": "int", "repr": str(obj), "value": obj}
        
        # 浮点数
        if isinstance(obj, float):
            return {"type": "float", "repr": str(obj), "value": obj}
        
        # 复数
        if isinstance(obj, complex):
            return {"type": "complex", "repr": str(obj), "value": {"real": obj.real, "imag": obj.imag}}
        
        # 字符串
        if isinstance(obj, str):
            if len(obj) > 50:
                return {"type": "str", "repr": repr(obj[:50] + "..."), "length": len(obj)}
            return {"type": "str", "repr": repr(obj), "length": len(obj)}
        
        # 字节
        if isinstance(obj, bytes):
            return {"type": "bytes", "repr": f"bytes({len(obj)})", "length": len(obj)}
        
        # 列表和元组
        if isinstance(obj, (list, tuple)):
            items = []
            for i, item in enumerate(obj[:10]):
                items.append(self.serialize_value(item, depth + 1, seen))
            
            return {
                "type": "list" if isinstance(obj, list) else "tuple",
                "repr": f"{type(obj).__name__}({len(obj)} items)",
                "length": len(obj),
                "items": items
            }
        
        # 字典
        if isinstance(obj, dict):
            items = {}
            for i, (k, v) in enumerate(obj.items()):
                if i >= 10:
                    break
                key_str = str(k)[:20]
                items[key_str] = self.serialize_value(v, depth + 1, seen)
            
            return {
                "type": "dict",
                "repr": f"dict({len(obj)} items)",
                "length": len(obj),
                "items": items
            }
        
        # 集合
        if isinstance(obj, set):
            items = []
            for i, item in enumerate(obj):
                if i >= 10:
                    break
                items.append(self.serialize_value(item, depth + 1, seen))
            
            return {
                "type": "set",
                "repr": f"set({len(obj)} items)",
                "length": len(obj),
                "items": items
            }
        
        # 函数
        if callable(obj):
            func_name = getattr(obj, '__name__', 'unknown')
            # 跳过追踪器自己的方法
            if func_name in ['trace_calls', 'serialize_value', 'get_stack_depth', 'set_user_code']:
                return {"type": "internal", "repr": "<internal>"}
            return {
                "type": "function",
                "repr": f"<function {func_name}>",
                "name": func_name
            }
        
        # 模块
        if isinstance(obj, type(sys)):
            return {"type": "module", "repr": f"<module {getattr(obj, '__name__', 'unknown')}>"}
        
        # 类类型
        if isinstance(obj, type):
            return {
                "type": "class",
                "repr": f"<class '{obj.__name__}'>",
                "name": obj.__name__
            }
        
        # 其他对象
        class_name = getattr(obj.__class__, '__name__', type(obj).__name__)
        module_name = getattr(obj.__class__, '__module__', 'unknown')
        
        # 获取对象的属性
        attrs = {}
        if hasattr(obj, '__dict__') and obj.__dict__:
            for i, (k, v) in enumerate(obj.__dict__.items()):
                if i >= 5:
                    break
                if not k.startswith('_'):
                    try:
                        attrs[k] = self.serialize_value(v, depth + 1, seen)
                    except:
                        pass
        
        return {
            "type": "object",
            "class": class_name,
            "module": module_name,
            "repr": f"<{class_name} object>",
            "attrs": attrs
        }

tracer = ExecutionTracer()
`;
            
            await pyodide.runPythonAsync(tracerCode);
            showStatus('Python 运行时加载完成！');
            console.log("Pyodide 初始化完成");
        }

        // 高亮行
        function highlightLine(lineNum) {
            const lines = editor.value.split('\n');
            if (lineNum < 1 || lineNum > lines.length) return;
            
            // 滚动到指定行
            const lineHeight = 22.4;
            editor.scrollTop = (lineNum - 1) * lineHeight - editor.clientHeight / 2 + 100;
            
            // 高亮行号
            const numbers = lineNumbers.textContent.split('\n');
            const displayNum = numbers[lineNum - 1] || lineNum;
            numbers[lineNum - 1] = '▶ ' + displayNum.replace('▶ ', '');
            lineNumbers.textContent = numbers.join('\n');
            
            setTimeout(updateLineNumbers, 2000);
        }

        // 运行代码
        async function runCode() {
            const code = editor.value;
            executionSteps = [];
            currentStep = 0;
            userCodeLines = code.split('\n');
            
            document.getElementById('btn-run').disabled = true;
            showStatus('正在执行代码...', 0);
            
            try {
                // 重置追踪器并设置用户代码
                await pyodide.runPythonAsync(`
tracer.steps = []
tracer.current_step = 0
tracer.set_user_code(${JSON.stringify(code)})
                `);
                
                // 设置追踪
                await pyodide.runPythonAsync(`
sys.settrace(tracer.trace_calls)
                `);
                
                // 执行代码
                await pyodide.runPythonAsync(code);
                
                // 关闭追踪
                await pyodide.runPythonAsync(`
sys.settrace(None)
                `);
                
                // 获取结果
                const stepsJson = await pyodide.runPythonAsync(`json.dumps(tracer.steps)`);
                executionSteps = JSON.parse(stepsJson);
                
                if (executionSteps.length === 0) {
                    showStatus('代码执行完成，但没有捕获到步骤');
                    visualization.innerHTML = '<div class="empty-vars">没有捕获到执行步骤（代码可能没有执行任何语句，或所有代码都被过滤了）</div>';
                } else {
                    showStatus(`捕获了 ${executionSteps.length} 个执行步骤`);
                    enableStepMode();
                    visualizeStep(0);
                }
                
            } catch (error) {
                console.error("执行错误:", error);
                
                const lineMatch = error.message.match(/line (\d+)/);
                if (lineMatch) {
                    highlightLine(parseInt(lineMatch[1]));
                }
                
                showStatus('执行错误: ' + error.message);
                visualization.innerHTML = 
                    `<div class="error-box">
                        <strong>执行错误</strong>
                        <pre>${error.message}</pre>
                    </div>`;
            } finally {
                document.getElementById('btn-run').disabled = false;
            }
        }

        // 启用单步模式
        function enableStepMode() {
            document.getElementById('btn-next').disabled = false;
            document.getElementById('btn-prev').disabled = false;
        }

        // 可视化步骤
        function visualizeStep(index) {
            if (index < 0 || index >= executionSteps.length) return;
            
            currentStep = index;
            const step = executionSteps[index];
            
            console.log("当前步骤:", step);
            
            highlightLine(step.line);
            
            // 获取当前行代码
            const currentLineCode = userCodeLines[step.line - 1] || '';
            
            let html = `
                <div class="step-info">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong>步骤 ${index + 1} / ${executionSteps.length}</strong>
                        <span style="color: #7f8c8d; font-size: 14px;">
                            第 ${step.line} 行 · 函数: ${step.function} · 堆栈深度: ${step.stack_depth}
                        </span>
                    </div>
                    ${currentLineCode ? `<div class="code-preview">${escapeHtml(currentLineCode.trim())}</div>` : ''}
                </div>
            `;
            
            
            // 全局变量
            const globalKeys = Object.keys(step.globals || {});
            if (globalKeys.length > 0) {
                html += `<h3>全局变量 (${globalKeys.length})</h3>`;
                html += renderVariables(step.globals);
            }
            
            // 局部变量
            const localKeys = Object.keys(step.locals || {});
            html += `<h3 style="cursor: pointer;" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'; this.textContent=this.textContent.startsWith('▶')?'▼ 局部变量 ('+${localKeys.length}+')':'▶ 局部变量 ('+${localKeys.length}+')'">▼ 局部变量 (${localKeys.length})</h3><div>${renderVariables(step.locals)}</div>`;
            html += renderVariables(step.locals);
            
            visualization.innerHTML = html;
        }

        // 渲染变量
        function renderVariables(vars) {
            if (!vars || Object.keys(vars).length === 0) {
                return '<div class="empty-vars">(无变量)</div>';
            }
            
            let html = '<div class="var-container">';
            
            for (const [name, info] of Object.entries(vars)) {
                html += renderVariable(name, info);
            }
            
            html += '</div>';
            return html;
        }

        // 渲染单个变量
        function renderVariable(name, info, indent = 0) {
            // 防御性检查
            if (!info || typeof info !== 'object') {
                return `<div class="var-box" style="margin-left: ${indent * 20}px">
                    <span class="var-name">${escapeHtml(String(name))}</span>
                    <span class="var-type">unknown</span>
                    <span class="var-value">${escapeHtml(String(info))}</span>
                </div>`;
            }
            
            const typeColors = {
                'int': '#e8f5e9',
                'float': '#e8f5e9',
                'complex': '#e8f5e9',
                'str': '#fff3e0',
                'bool': '#fffde7',
                'NoneType': '#fafafa',
                'list': '#f3e5f5',
                'tuple': '#f3e5f5',
                'dict': '#e0f2f1',
                'set': '#e0f2f1',
                'bytes': '#e0f2f1',
                'object': '#eceff1',
                'class': '#d1ecf1',
                'function': '#d1ecf1',
                'circular': '#ffcdd2',
                'deep': '#cfd8dc',
                'error': '#ffebee',
                'internal': '#f5f5f5'
            };
            
            const bg = typeColors[info.type] || '#f5f5f5';
            const marginLeft = indent * 20;
            
            let html = `<div class="var-box" style="background: ${bg}; margin-left: ${marginLeft}px">`;
            
            // 变量头部
            html += '<div class="var-header">';
            html += `<span class="var-name">${escapeHtml(String(name))}</span>`;
            html += `<span class="var-type">${escapeHtml(String(info.type || 'unknown'))}</span>`;
            
            // 值显示
            let valueDisplay = info.repr || info.value || 'N/A';
            if (typeof info.value === 'object' && info.value !== null) {
                valueDisplay = JSON.stringify(info.value);
            }
            html += `<span class="var-value">${escapeHtml(String(valueDisplay))}</span>`;
            html += '</div>';
            
            // 递归渲染容器内容
            if (info.items && Array.isArray(info.items) && info.items.length > 0) {
                html += '<div class="var-items">';
                info.items.forEach((item, idx) => {
                    if (typeof item === 'object' && item !== null) {
                        html += renderVariable(`[${idx}]`, item, indent + 1);
                    } else {
                        html += `<div class="var-item">
                            <span class="item-index">[${idx}]</span>
                            <span>${escapeHtml(String(item))}</span>
                        </div>`;
                    }
                });
                if (info.length > (info.items.length || 0)) {
                    html += `<div style="color: #7f8c8d; font-size: 12px; margin-top: 5px;">
                        ... 还有 ${info.length - info.items.length} 项
                    </div>`;
                }
                html += '</div>';
            } else if (info.items && typeof info.items === 'object' && Object.keys(info.items).length > 0) {
                // 字典类型的 items
                html += '<div class="var-items">';
                for (const [key, val] of Object.entries(info.items)) {
                    html += renderVariable(key, val, indent + 1);
                }
                if (info.length > Object.keys(info.items).length) {
                    html += `<div style="color: #7f8c8d; font-size: 12px; margin-top: 5px;">
                        ... 还有 ${info.length - Object.keys(info.items).length} 项
                    </div>`;
                }
                html += '</div>';
            }
            
            // 对象属性
            if (info.attrs && Object.keys(info.attrs).length > 0) {
                html += '<div class="var-items">';
                html += '<div style="color: #7f8c8d; font-size: 12px; margin-bottom: 5px;">属性:</div>';
                for (const [key, val] of Object.entries(info.attrs)) {
                    html += renderVariable(key, val, indent + 1);
                }
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            if (text === null || text === undefined) return 'N/A';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // 步骤控制
        function stepForward() {
            if (currentStep < executionSteps.length - 1) {
                visualizeStep(currentStep + 1);
            } else {
                showStatus('已到达最后一步');
            }
        }

        function stepBackward() {
            if (currentStep > 0) {
                visualizeStep(currentStep - 1);
            }
        }

        function reset() {
            currentStep = 0;
            executionSteps = [];
            updateLineNumbers();
            visualization.innerHTML = `
                <div style="color: #999; text-align: center; margin-top: 50%;">
                    点击"运行"开始可视化执行
                </div>
            `;
            document.getElementById('btn-next').disabled = true;
            document.getElementById('btn-prev').disabled = true;
            showStatus('已重置');
        }

        // 初始化
        async function init() {
            if (isInitialized) return;
            isInitialized = true;
            
            try {
                await initPyodide();
            } catch (err) {
                console.error("初始化失败:", err);
                showStatus('初始化失败: ' + err.message, 0);
            }
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
