<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyIdle - Python 可视化执行</title>
    
    <!-- Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    
    <!-- CodeMirror 6 -->
    <script src="https://cdn.jsdelivr.net/npm/@codemirror/lang-python@6.1.3/dist/index.js" type="module"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@codemirror/view@6.22.0/dist/view.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }
        
        #header {
            height: 50px;
            background: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
        }
        
        #header h1 {
            font-size: 18px;
            margin-right: auto;
        }
        
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        button:hover { background: #2980b9; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        #editor-container {
            width: 50%;
            height: 100%;
            border-right: 2px solid #ddd;
            position: relative;
        }
        
        #editor {
            width: 100%;
            height: 100%;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 10px;
            border: none;
            outline: none;
            resize: none;
            tab-size: 4;
        }
        
        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 40px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: 10px 5px;
            text-align: right;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #adb5bd;
            user-select: none;
            overflow: hidden;
        }
        
        .editor-wrapper {
            position: absolute;
            left: 40px;
            right: 0;
            top: 0;
            bottom: 0;
        }
        
        #editor {
            width: 100%;
            height: 100%;
        }
        
        #visualization {
            width: 50%;
            height: 100%;
            background: white;
            overflow: auto;
            padding: 20px;
        }
        
        .current-line {
            background: rgba(255, 235, 59, 0.4);
        }
        
        .error-line {
            background: rgba(231, 76, 60, 0.3);
        }
        
        #status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            display: none;
            z-index: 1000;
        }
        
        .var-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 8px;
            margin: 4px 0;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .var-name { color: #e74c3c; font-weight: bold; }
        .var-type { color: #7f8c8d; font-size: 12px; margin-left: 8px; }
        .var-value { color: #27ae60; margin-left: 8px; }
        
        /* 简单语法高亮 */
        .cm-editor { height: 100%; }
    </style>
</head>
<body>
    <div id="header">
        <h1>🐍 PyIdle - Python 可视化执行器</h1>
        <button id="btn-run" onclick="runCode()">▶ 运行</button>
        <button id="btn-next" onclick="stepForward()" disabled>→ 下一步</button>
        <button id="btn-prev" onclick="stepBackward()" disabled>← 上一步</button>
        <button onclick="reset()">↺ 重置</button>
    </div>
    
    <div id="main">
        <div id="editor-container">
            <div class="line-numbers" id="line-numbers">1</div>
            <div class="editor-wrapper">
                <textarea id="editor" spellcheck="false"># 在这里编写 Python 代码
x = [1, 2, 3]
y = {"name": "Alice", "age": 25}

def factorial(n):
    if n <= 1:
        return 1
    return n * factorial(n - 1)

result = factorial(3)
print(result)</textarea>
            </div>
        </div>
        <div id="visualization">
            <div style="color: #999; text-align: center; margin-top: 50%;">
                点击"运行"开始可视化执行
            </div>
        </div>
    </div>
    
    <div id="status"></div>

    <script>
        // 全局变量
        let pyodide;
        let executionSteps = [];
        let currentStep = 0;
        let isInitialized = false;

        const editor = document.getElementById('editor');
        const lineNumbers = document.getElementById('line-numbers');

        // 同步行号
        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
        }

        editor.addEventListener('input', updateLineNumbers);
        editor.addEventListener('scroll', () => {
            lineNumbers.scrollTop = editor.scrollTop;
        });
        
        // Tab 键支持
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
            }
        });

        updateLineNumbers();

        // 显示状态
        function showStatus(msg, duration = 3000) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.style.display = 'block';
            if (duration > 0) {
                setTimeout(() => el.style.display = 'none', duration);
            }
        }

        // 初始化 Pyodide
        async function initPyodide() {
            showStatus('正在加载 Python 运行时...', 0);
            pyodide = await loadPyodide();
            
            // 注入追踪代码
            const tracerCode = `
import sys
import json
import builtins
import linecache

class ExecutionTracer:
    def __init__(self):
        self.steps = []
        self.current_step = 0
        self.max_steps = 1000
        
    def trace_calls(self, frame, event, arg):
        if self.current_step > self.max_steps:
            return None
            
        if event == 'line':
            step_info = {
                'step': self.current_step,
                'line': frame.f_lineno,
                'function': frame.f_code.co_name,
                'locals': self.safe_serialize(frame.f_locals),
                'globals': self.safe_serialize({k: v for k, v in frame.f_globals.items() 
                                               if not k.startswith('__') and k not in ['sys', 'json', 'builtins', 'ExecutionTracer', 'linecache', 'tracer']}),
                'stack_depth': self.get_stack_depth(frame)
            }
            self.steps.append(step_info)
            self.current_step += 1
            
        return self.trace_calls
    
    def get_stack_depth(self, frame):
        depth = 0
        current = frame
        while current:
            depth += 1
            current = current.f_back
        return depth
    
    def safe_serialize(self, obj, depth=0, seen=None):
        if seen is None:
            seen = set()
        if depth > 3:
            return {"type": "ellipsis", "repr": "..."}
        
        try:
            obj_id = id(obj)
            if obj_id in seen:
                return {"type": "circular", "repr": "<circular ref>"}
            seen.add(obj_id)
            
            if obj is None:
                return {"type": "None", "repr": "None"}
            elif isinstance(obj, bool):
                return {"type": "bool", "repr": str(obj), "value": obj}
            elif isinstance(obj, int):
                return {"type": "int", "repr": str(obj), "value": obj}
            elif isinstance(obj, float):
                return {"type": "float", "repr": str(obj), "value": obj}
            elif isinstance(obj, str):
                display = repr(obj[:50] + ('...' if len(obj) > 50 else ''))
                return {"type": "str", "repr": display}
            elif isinstance(obj, (list, tuple)):
                items = [self.safe_serialize(item, depth+1, seen.copy()) 
                        for item in obj[:20]]
                return {
                    "type": "list",
                    "repr": f"[{len(obj)} items]" if len(obj) > 20 else repr(obj),
                    "items": items,
                    "length": len(obj)
                }
            elif isinstance(obj, dict):
                items = {}
                for k, v in list(obj.items())[:20]:
                    key_str = str(k)[:20]
                    items[key_str] = self.safe_serialize(v, depth+1, seen.copy())
                return {
                    "type": "dict",
                    "repr": f"{{{len(obj)} items}}" if len(obj) > 20 else repr(obj),
                    "items": items,
                    "length": len(obj)
                }
            elif hasattr(obj, '__class__'):
                class_name = obj.__class__.__name__
                repr_str = repr(obj)[:50]
                return {
                    "type": "object",
                    "class": class_name,
                    "repr": repr_str
                }
            else:
                return {"type": "unknown", "repr": str(obj)[:50]}
        except Exception as e:
            return {"type": "error", "repr": f"<error: {str(e)}>"}
        finally:
            seen.discard(obj_id)

tracer = ExecutionTracer()
`;
            
            await pyodide.runPythonAsync(tracerCode);
            showStatus('Python 运行时加载完成！');
            console.log("Pyodide 初始化完成");
        }

        // 高亮行
        function highlightLine(lineNum, type = 'current') {
            // 移除旧的高亮
            editor.style.background = 'white';
            
            // 简单的行高亮：通过创建 overlay 实现
            const lines = editor.value.split('\n');
            if (lineNum < 1 || lineNum > lines.length) return;
            
            // 滚动到指定行
            const lineHeight = 21; // 近似行高
            editor.scrollTop = (lineNum - 1) * lineHeight - editor.clientHeight / 2;
            
            // 视觉提示（通过状态栏）
            showStatus(`第 ${lineNum} 行`, 1000);
        }

        // 运行代码
        async function runCode() {
            const code = editor.value;
            executionSteps = [];
            currentStep = 0;
            
            document.getElementById('btn-run').disabled = true;
            showStatus('正在执行代码...', 0);
            
            try {
                // 重置追踪器
                await pyodide.runPythonAsync(`
tracer.steps = []
tracer.current_step = 0
                `);
                
                // 设置追踪并执行
                await pyodide.runPythonAsync(`
sys.settrace(tracer.trace_calls)
                `);
                
                await pyodide.runPythonAsync(code);
                
                await pyodide.runPythonAsync(`
sys.settrace(None)
                `);
                
                // 获取结果
                const stepsJson = await pyodide.runPythonAsync(`json.dumps(tracer.steps)`);
                executionSteps = JSON.parse(stepsJson);
                
                if (executionSteps.length === 0) {
                    showStatus('代码执行完成，但没有捕获到步骤');
                    document.getElementById('visualization').innerHTML = 
                        '<div style="color: #e74c3c; text-align: center; margin-top: 50%;">没有捕获到执行步骤</div>';
                } else {
                    showStatus(`捕获了 ${executionSteps.length} 个执行步骤`);
                    enableStepMode();
                    visualizeStep(0);
                }
                
            } catch (error) {
                console.error("执行错误:", error);
                
                const lineMatch = error.message.match(/line (\\d+)/);
                if (lineMatch) {
                    const errorLine = parseInt(lineMatch[1]);
                    highlightLine(errorLine, 'error');
                }
                
                showStatus('执行错误: ' + error.message);
                document.getElementById('visualization').innerHTML = 
                    `<div style="color: #e74c3c; padding: 20px;">
                        <h3>执行错误</h3>
                        <pre style="background: #f8f9fa; padding: 10px; border-radius: 4px; overflow: auto;">${error.message}</pre>
                    </div>`;
            } finally {
                document.getElementById('btn-run').disabled = false;
            }
        }

        // 启用单步模式
        function enableStepMode() {
            document.getElementById('btn-next').disabled = false;
            document.getElementById('btn-prev').disabled = false;
        }

        // 可视化步骤
        function visualizeStep(index) {
            if (index < 0 || index >= executionSteps.length) return;
            
            currentStep = index;
            const step = executionSteps[index];
            const container = document.getElementById('visualization');
            
            highlightLine(step.line);
            
            let html = `
                <div style="margin-bottom: 20px; padding: 15px; background: #ecf0f1; border-radius: 5px; border-left: 4px solid #3498db;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <strong>步骤 ${index + 1} / ${executionSteps.length}</strong>
                        <span style="color: #7f8c8d; font-size: 14px;">第 ${step.line} 行 · ${step.function}()</span>
                    </div>
                </div>
            `;
            
            // 局部变量
            html += '<h3 style="color: #2c3e50; margin: 20px 0 10px; font-size: 16px;">局部变量</h3>';
            html += renderVariables(step.locals);
            
            // 全局变量
            const globalKeys = Object.keys(step.globals);
            if (globalKeys.length > 0 && globalKeys.length < 15) {
                html += '<h3 style="color: #2c3e50; margin: 20px 0 10px; font-size: 16px;">全局变量</h3>';
                html += renderVariables(step.globals);
            }
            
            container.innerHTML = html;
        }

        // 渲染变量
        function renderVariables(vars) {
            if (Object.keys(vars).length === 0) {
                return '<p style="color: #95a5a6; font-style: italic;">(无变量)</p>';
            }
            
            let html = '<div style="display: grid; gap: 8px;">';
            
            for (const [name, info] of Object.entries(vars)) {
                html += renderVariable(name, info);
            }
            
            html += '</div>';
            return html;
        }

        // 渲染单个变量
        function renderVariable(name, info, indent = 0) {
            const colors = {
                'int': '#e8f5e9',
                'float': '#e8f5e9',
                'str': '#fff3e0',
                'bool': '#fffde7',
                'None': '#fafafa',
                'list': '#f3e5f5',
                'dict': '#e0f2f1',
                'object': '#eceff1',
                'ellipsis': '#cfd8dc',
                'circular': '#ffcdd2',
                'error': '#ffebee'
            };
            
            const bg = colors[info.type] || '#f5f5f5';
            const marginLeft = indent * 20;
            
            let html = `
                <div class="var-box" style="background: ${bg}; margin-left: ${marginLeft}px;">
                    <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
                        <span class="var-name">${escapeHtml(name)}</span>
                        <span class="var-type">${info.type}</span>
                        <span class="var-value">${escapeHtml(info.repr)}</span>
                    </div>
            `;
            
            // 递归渲染容器内容
            if (info.items && info.type === 'list') {
                html += '<div style="margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap;">';
                info.items.forEach((item, idx) => {
                    html += `<div style="background: white; padding: 2px 6px; border-radius: 3px; font-size: 12px; border: 1px solid #ddd;">
                        [${idx}] ${escapeHtml(item.repr)}
                    </div>`;
                });
                if (info.length > 20) {
                    html += `<div style="color: #7f8c8d; font-size: 12px;">... 还有 ${info.length - 20} 项</div>`;
                }
                html += '</div>';
            } else if (info.items && info.type === 'dict') {
                html += '<div style="margin-top: 8px;">';
                for (const [key, val] of Object.entries(info.items)) {
                    html += renderVariable(key, val, indent + 1);
                }
                if (info.length > 20) {
                    html += `<div style="color: #7f8c8d; font-size: 12px; margin-left: ${(indent+1)*20}px;">... 还有 ${info.length - 20} 项</div>`;
                }
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 步骤控制
        function stepForward() {
            if (currentStep < executionSteps.length - 1) {
                visualizeStep(currentStep + 1);
            } else {
                showStatus('已到达最后一步');
            }
        }

        function stepBackward() {
            if (currentStep > 0) {
                visualizeStep(currentStep - 1);
            }
        }

        function reset() {
            currentStep = 0;
            executionSteps = [];
            editor.style.background = 'white';
            document.getElementById('visualization').innerHTML = `
                <div style="color: #999; text-align: center; margin-top: 50%;">
                    点击"运行"开始可视化执行
                </div>
            `;
            document.getElementById('btn-next').disabled = true;
            document.getElementById('btn-prev').disabled = true;
            showStatus('已重置');
        }

        // 初始化
        async function init() {
            if (isInitialized) return;
            isInitialized = true;
            
            try {
                await initPyodide();
            } catch (err) {
                console.error("初始化失败:", err);
                showStatus('初始化失败: ' + err.message);
            }
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
